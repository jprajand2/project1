apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-webapp-deployment
  labels:
    app: python-webapp
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: python-webapp
  template:
    metadata:
      labels:
        app: python-webapp
    spec:
      containers:
      - name: python-webapp
        image: jprajand2/program4:v1.0
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: python-webapp-service
  labels:
    app: python-webapp
spec:
  type: NodePort
  selector:
    app: python-webapp
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30000
